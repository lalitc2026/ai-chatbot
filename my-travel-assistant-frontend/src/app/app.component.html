<div class="chat-container">
  <h1>{{ title }}</h1>

  <div class="messages-window">
    <div *ngFor="let msg of messages" [ngClass]="msg.role">
      <div class="bubble">
        <strong>{{ msg.role === 'user' ? 'You' : 'Assistant' }}</strong>
        <p>{{ msg.text }}</p>
        <span class="meta">{{ msg.createdAt | date:'shortTime' }}</span>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <input
      type="text"
      placeholder="Type your question..."
      [(ngModel)]="query"
      (keyup.enter)="submitQuery()"
      [disabled]="isLoading"
    />
    <button (click)="submitQuery()" [disabled]="!query.trim() || isLoading">
      Submit
    </button>
  </div>

  <div class="status-bar">
    <small *ngIf="sessionId">Session: {{ sessionId }}</small>
    <small class="error" *ngIf="errorMessage">{{ errorMessage }}</small>
  </div>
</div>
